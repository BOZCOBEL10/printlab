<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintLab // SUPPORT</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo">PRINT<span>LAB</span></div>
        <div class="nav-links">
            <button class="nav-action-btn" onclick="window.location.href='index.html'">HOME</button>
            <button class="nav-action-btn" onclick="showOrderForm('inschool')">IN SCHOOL</button>
            <button class="nav-action-btn" onclick="showOrderForm('others')">OTHERS</button>
        </div>
    </nav>

    <main style="padding: 50px 20px; max-width: 800px; margin: 0 auto;">
        <h1 style="font-family: 'Orbitron'; margin-bottom: 20px;">OPERATOR SUPPORT</h1>
        <p style="color: #888; margin-bottom: 40px;">Discuss about custom prints, file assistance, or deployment troubleshooting.</p>

        <!-- Order Form Container (Used for Support) -->
        <div id="order-form-container" class="tactical-order-info">
            <h3 style="margin-bottom: 20px; color: var(--val-red);">TICKET SUBMISSION</h3>
            <input type="text" id="orderName" class="t-input" placeholder="OPERATOR ID / NAME">
<div class="t-row">
    <select id="orderClass" class="t-select">
        <option>CLASS</option>
        <option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
    </select>
    <select id="orderSection" class="t-select">
        <option>SECTION</option>
        <option>A</option><option>B</option><option>C</option><option>D</option>
        <option>E</option><option>F</option><option>G</option><option>H</option>
        <option>I</option><option>J</option><option>K</option><option>L</option>
        <option>M</option><option>N</option>
    </select>
</div>
            
            <div class="custom-input-group">
                <input type="text" id="customFileLink" class="t-input" placeholder="FILE LINK / SOURCE">
                <textarea id="customDetails" class="t-textarea" placeholder="DETAILED REQUEST / ISSUE DESCRIPTION"></textarea>
            </div>

            <button onclick="addCustomsToLog()" style="margin-top: 10px;">Contact us.</button>
        </div>

        <div id="coming-soon-container" style="display: none; padding: 40px; border: 1px dashed var(--val-red); text-align: center;">
            <p>EXTERNAL DEPLOYMENTS CURRENTLY OFFLINE. CONTACT ADMIN.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
